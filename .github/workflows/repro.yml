name: Reproduce Gradle cold-start bug

on:
  push:
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        # Required: settings.gradle runs `node --print require.resolve(...)` at
        # configuration time to locate @react-native/gradle-plugin and
        # expo-modules-autolinking. Without node_modules these paths can't resolve.

      - name: Clear Gradle cache
        run: rm -rf ~/.gradle/caches
        # Simulates a fresh developer machine or CI runner with no prior Gradle cache.
        # This is the condition that triggers the bug.

      - name: Build Android (expected to fail with Gradle 9.0.0)
        run: ./android/gradlew app:assembleDebug --stacktrace
        # Expected failure:
        #   Error resolving plugin [id: 'com.facebook.react.settings']
        #   > Could not read workspace metadata from
        #     ~/.gradle/caches/9.0.0/kotlin-dsl/accessors/<hash>/metadata.bin
        #   Caused by: java.io.FileNotFoundException: ...metadata.bin (No such file or directory)
